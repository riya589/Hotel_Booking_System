<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('HotelHaven | Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="form-panel">
                <span class="hero-kicker mb-3">Secure Sign In</span>
                <h1 class="section-title">Welcome back</h1>
                <p class="section-copy">Sign in to manage bookings, invoices, and admin workflows.</p>
                <div id="loginAlert" class="alert alert-danger d-none"></div>
                <form id="loginForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div class="col-12 d-grid">
                        <button class="btn btn-accent" type="submit">Login</button>
                    </div>
                </form>
                <div class="mt-4 p-3 rounded-4" style="background: rgba(16,37,66,0.05);">
                    <div class="fw-bold mb-2">Demo Credentials</div>
                    <div class="small text-muted">Admin: admin@hotel.com / admin123</div>
                    <div class="small text-muted">Customer: user@hotel.com / user123</div>
                </div>
            </div>
        </div>
    </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const alertBox = document.getElementById('loginAlert');
        alertBox.classList.add('d-none');
        try {
            const payload = await hotelApp.api('/auth/login', {
                method: 'POST',
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            hotelApp.setAuth(payload);
            const params = new URLSearchParams(window.location.search);
            const nextUrl = params.get('next');
            window.location.href = nextUrl ? decodeURIComponent(nextUrl) : '/dashboard';
        } catch (error) {
            alertBox.textContent = error.message;
            alertBox.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
