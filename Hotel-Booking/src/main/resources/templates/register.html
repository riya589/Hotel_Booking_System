<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('HotelHaven | Register')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="form-panel">
                <span class="hero-kicker mb-3">Create Customer Account</span>
                <h1 class="section-title">Join HotelHaven</h1>
                <p class="section-copy">Register to search hotels, book rooms, pay, and download invoices.</p>
                <div id="registerAlert" class="alert alert-danger d-none"></div>
                <form id="registerForm" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input id="fullName" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input id="phoneNumber" class="form-control" maxlength="10" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input id="email" type="email" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input id="password" type="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password</label>
                        <input id="confirmPassword" type="password" class="form-control" required>
                    </div>
                    <div class="col-12 d-grid">
                        <button class="btn btn-accent" type="submit">Register and Continue</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    document.getElementById('registerForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const alertBox = document.getElementById('registerAlert');
        alertBox.classList.add('d-none');
        try {
            const payload = await hotelApp.api('/auth/register', {
                method: 'POST',
                body: JSON.stringify({
                    fullName: document.getElementById('fullName').value,
                    phoneNumber: document.getElementById('phoneNumber').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    confirmPassword: document.getElementById('confirmPassword').value
                })
            });
            hotelApp.setAuth(payload);
            window.location.href = '/dashboard';
        } catch (error) {
            alertBox.textContent = error.message;
            alertBox.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
